name: Release & Publish to PyPI

on:
    workflow_run:
        workflows: ["CI Check"]
        types:
            - completed

jobs:
    # ── Build check: runs on PRs to verify package builds correctly ──────
    check:
        if: >-
            github.event.workflow_run.event == 'pull_request' &&
            github.event.workflow_run.conclusion == 'success'
        name: Build check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install build tools
              run: python -m pip install --upgrade pip build twine

            - name: Build package
              run: python -m build

            - name: Verify package metadata
              run: python -m twine check dist/*

    # ── Prepare: extract version, update pyproject.toml, tag ─────────────
    # Only runs on push to main with commit message starting with "release:"
    prepare:
        if: >-
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'main' &&
            startsWith(github.event.workflow_run.head_commit.message, 'release:') &&
            github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            version: ${{ steps.meta.outputs.version }}
            tag: ${{ steps.meta.outputs.tag }}
            prerelease: ${{ steps.meta.outputs.prerelease }}

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Extract release metadata
              id: meta
              env:
                  COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
              run: |
                  SUBJECT=$(echo "$COMMIT_MSG" | head -1)

                  # Support both "release: v2.0.0" and "release: 2.0.0"
                  VERSION=$(echo "$SUBJECT" | sed -n 's/^release:[[:space:]]*v\{0,1\}\([^[:space:]]\{1,\}\).*/\1/p')

                  if [ -z "$VERSION" ]; then
                    echo "::error::Could not extract version from: $SUBJECT"
                    echo "::error::Expected format: release: v2.0.0 or release: 2.0.0b1"
                    exit 1
                  fi

                  TAG="v${VERSION}"

                  # PEP 440 pre-release identifiers: alpha (aN), beta (bN), rc (rcN), dev (devN)
                  if echo "$VERSION" | grep -qE '(a|b|rc|dev)[0-9]+'; then
                    PRERELEASE=true
                  else
                    PRERELEASE=false
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

                  echo "### 📦 Release" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- **Pre-release:** $PRERELEASE" >> "$GITHUB_STEP_SUMMARY"

            - name: Check tag does not already exist
              run: |
                  if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
                    echo "::error::Tag ${{ steps.meta.outputs.tag }} already exists"
                    exit 1
                  fi

            - name: Update pyproject.toml version
              run: |
                  sed -i 's/^version = .*/version = "'"${{ steps.meta.outputs.version }}"'"/' pyproject.toml
                  echo "pyproject.toml version set to: $(grep '^version' pyproject.toml)"

            - name: Commit version bump & create tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add pyproject.toml
                  # Only commit if pyproject.toml actually changed
                  if ! git diff --cached --quiet; then
                    git commit -m "chore: bump version to ${{ steps.meta.outputs.version }}"
                  fi

                  git tag "${{ steps.meta.outputs.tag }}"
                  git push origin HEAD:main --tags

    # ── Build release artifacts ──────────────────────────────────────────
    build:
        needs: prepare
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ needs.prepare.outputs.tag }}

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install build tools
              run: python -m pip install --upgrade pip build twine

            - name: Build package
              run: python -m build

            - name: Verify package
              run: python -m twine check dist/*

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: python-package-distributions
                  path: dist/

    # ── Publish to PyPI via Trusted Publishing (OIDC) ────────────────────
    publish-pypi:
        needs: [prepare, build]
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v8
              with:
                  name: python-package-distributions
                  path: dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

    # ── Create GitHub Release ────────────────────────────────────────────
    github-release:
        needs: [prepare, publish-pypi]
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  ref: ${{ needs.prepare.outputs.tag }}
                  fetch-depth: 0

            - name: Generate Changelog
              run: |
                  CURRENT_TAG="${{ needs.prepare.outputs.tag }}"
                  # Find the previous tag before this one
                  PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

                  echo "## What's Changed" > release_notes.md
                  echo "" >> release_notes.md

                  if [ -z "$PREV_TAG" ]; then
                    echo "First release tag: $CURRENT_TAG"
                    git log --no-merges --pretty=format:"- %s (%h)" "${CURRENT_TAG}" | grep -vE "^- (release:|chore: bump version to)" >> release_notes.md
                  else
                    echo "Generating changes between $PREV_TAG and $CURRENT_TAG"
                    git log --no-merges --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}" | grep -vE "^- (release:|chore: bump version to)" >> release_notes.md
                  fi
                  echo "" >> release_notes.md

            - name: Create GitHub Release
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  PRERELEASE_FLAG=""
                  if [ "${{ needs.prepare.outputs.prerelease }}" = "true" ]; then
                    PRERELEASE_FLAG="--prerelease"
                  fi

                  gh release create "${{ needs.prepare.outputs.tag }}" \
                    --repo "${{ github.repository }}" \
                    --notes-file release_notes.md \
                    $PRERELEASE_FLAG
